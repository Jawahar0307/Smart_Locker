input {
  file {
    path => "/var/log/smart_locker/app.json.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
    type => "app"
  }
  file {
    path => "/var/log/smart_locker/error.json.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
    type => "error"
  }
}

filter {
  # Add log type tag
  if [type] == "error" {
    mutate {
      add_tag => ["error"]
    }
  }

  # Parse timestamp
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss,SSS"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "smart-locker-logs-%{+YYYY.MM.dd}"
  }

  # Debug output (remove in production)
  stdout {
    codec => rubydebug
  }
}
