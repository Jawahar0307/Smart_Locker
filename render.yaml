# =============================================================================
# Render Blueprint – Smart Storage Locker Management System
# Docs: https://docs.render.com/blueprint-spec
# =============================================================================

databases:
  - name: smart-locker-db
    plan: free
    databaseName: smart_locker_db
    user: smart_locker_user

services:
  - type: web
    name: smart-locker-api
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DB_ENGINE
        value: "django.db.backends.postgresql"
      - key: DATABASE_URL
        fromDatabase:
          name: smart-locker-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: USE_REDIS
        value: "False"
      - key: WEB_CONCURRENCY
        value: "2"
